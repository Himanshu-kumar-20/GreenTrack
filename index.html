<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenTrack | Sustainable Living Platform</title>
    <meta name="description" content="Track your carbon footprint, classify waste with AI, discover organic markets, and join your eco-community with GreenTrack.">

    <!-- Preconnect for fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@800,500,700,400,900&display=swap" rel="stylesheet">

    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>

    <!-- Global CSS -->
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/animations.css">
    <link rel="stylesheet" href="styles/components.css">

    <!-- Page CSS -->
    <link rel="stylesheet" href="styles/pages/dashboard.css">
    <link rel="stylesheet" href="styles/pages/carbon.css">
    <link rel="stylesheet" href="styles/pages/waste.css">
    <link rel="stylesheet" href="styles/pages/market.css">
    <link rel="stylesheet" href="styles/pages/community.css">
    <link rel="stylesheet" href="styles/pages/profile.css">
</head>
<body class="theme-dark">

    <!-- Ambient Particle Background -->
    <div id="ambient-bg">
        <canvas id="particle-canvas"></canvas>
    </div>

    <!-- App Shell -->
    <div id="app" class="app-layout" style="display: none;">

        <!-- Sidebar Navbar -->
        <nav id="main-nav" class="navbar glass-panel">
            <div class="nav-brand">
                <span class="material-symbols-outlined brand-icon text-neon glow-pulse">eco</span>
                <span class="brand-text">GreenTrack</span>
            </div>

            <ul class="nav-links">
                <li class="nav-item hover-lift tap-scale">
                    <a href="#dashboard" class="nav-item active" data-route="dashboard">
                        <span class="material-symbols-outlined">dashboard</span>
                        <span class="label">Dashboard</span>
                    </a>
                </li>
                <li class="nav-item hover-lift tap-scale">
                    <a href="#carbon" class="nav-item" data-route="carbon">
                        <span class="material-symbols-outlined">co2</span>
                        <span class="label">Carbon</span>
                    </a>
                </li>
                <li class="nav-item hover-lift tap-scale">
                    <a href="#waste" class="nav-item" data-route="waste">
                        <span class="material-symbols-outlined">document_scanner</span>
                        <span class="label">AI Scanner</span>
                    </a>
                </li>
                <li class="nav-item hover-lift tap-scale">
                    <a href="#market" class="nav-item" data-route="market">
                        <span class="material-symbols-outlined">shopping_bag</span>
                        <span class="label">Market</span>
                    </a>
                </li>
                <li class="nav-item hover-lift tap-scale">
                    <a href="#community" class="nav-item" data-route="community">
                        <span class="material-symbols-outlined">groups</span>
                        <span class="label">Community</span>
                    </a>
                </li>
                <li class="nav-spacer"></li>
                <li class="nav-item hover-lift tap-scale">
                    <a href="#profile" class="nav-item" data-route="profile">
                        <span class="material-symbols-outlined">account_circle</span>
                        <span class="label">Profile</span>
                    </a>
                </li>
            </ul>

             <!-- Bottom Nav Controls -->
            <div class="nav-controls">
                <button class="nav-ctrl-btn hover-lift tap-scale" id="btn-notifications">
                    <span class="material-symbols-outlined">notifications</span>
                    <span>Notifications</span>
                    <span class="badge badge-red" style="margin-left:auto; font-size:0.65rem; padding:0.1rem 0.4rem;">4</span>
                </button>
                <button class="nav-ctrl-btn hover-lift tap-scale" id="btn-theme-toggle">
                    <span class="material-symbols-outlined" id="theme-icon">light_mode</span>
                    <span id="theme-label">Light Mode</span>
                </button>
                <button class="nav-ctrl-btn nav-signout-btn hover-lift tap-scale" id="btn-nav-signout" title="Sign Out">
                    <span class="material-symbols-outlined" style="color: var(--error);">logout</span>
                    <span style="color: var(--error);">Sign Out</span>
                </button>
            </div>
        </nav>

        <!-- Main Content -->
        <main id="router-view" class="main-content scroll-y">
            <!-- Content injected by router -->
        </main>
    </div>

    <!-- Auth Container -->
    <div id="auth-container" class="auth-layout" style="display: block;"></div>

    <!-- Global Toast Container -->
    <div id="toast-container" class="toast-stack"></div>

    <!-- Global Modal Overlay -->
    <div id="modal-container" class="modal-overlay hidden">
        <div class="modal-dialog glass-panel" id="modal-content"></div>
    </div>

    <!-- Application Logic -->
    <script type="module" src="js/firebase.js"></script>
    <script type="module" src="js/utils.js"></script>
    <script type="module" src="js/components.js"></script>
    <script type="module" src="js/auth.js"></script>
    <!-- Page Logic -->
    <script type="module" src="js/pages/dashboard.js"></script>
    <script type="module" src="js/pages/carbon.js"></script>
    <script type="module" src="js/pages/waste.js"></script>
    <script type="module" src="js/pages/market.js"></script>
    <script type="module" src="js/pages/community.js"></script>
    <script type="module" src="js/pages/profile.js"></script>
    <!-- Router MUST be last -->
    <script type="module" src="js/router.js"></script>

</body>
</html>
